<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Reports</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

header{
background:#0f172a;
color:white;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.card h3{
color:#555;
}

.card h1{
margin-top:10px;
color:#2563eb;
}

.toolbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.toolbar input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:12px 18px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

th{
background:#1e293b;
color:white;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f2f2f2;
}

.footer{
margin-top:20px;
text-align:center;
}

@media(max-width:768px){

table{
font-size:12px;
}

}

</style>

</head>

<body>

<header>

<h1>KESHAVA MEMORIAL COLLEGE OF ENGINEERING</h1>

<h3>Attendance Reports</h3>

</header>

<div class="summary">

<div class="card">
<h3>Total Reports</h3>
<h1 id="totalReports">0</h1>
</div>

<div class="card">
<h3>Total Present</h3>
<h1 id="totalPresent">0</h1>
</div>

<div class="card">
<h3>Total Absent</h3>
<h1 id="totalAbsent">0</h1>
</div>

<div class="card">
<h3>Attendance %</h3>
<h1 id="percentage">0%</h1>
</div>

</div>

<div class="toolbar">

<input
type="text"
id="search"
placeholder="Search Department..."
onkeyup="loadReports()">

<button onclick="window.print()">
Print
</button>

<button onclick="exportCSV()">
Export CSV
</button>

<button onclick="window.location='admin-dashboard.html'">
Dashboard
</button>

</div>

<table>

<thead>

<tr>

<th>Date</th>
<th>Time</th>
<th>Department</th>
<th>Teacher</th>
<th>Present</th>
<th>Absent</th>
<th>Absent Roll Numbers</th>

</tr>

</thead>

<tbody id="reportBody">

</tbody>

</table>

<div class="footer">

© 2026 KMCE Attendance Management System

</div>

<script>

function loadReports(){

let reports=JSON.parse(localStorage.getItem("attendanceHistory")) || [];

let body=document.getElementById("reportBody");

body.innerHTML="";

let search=document.getElementById("search").value.toLowerCase();

let totalPresent=0;
let totalAbsent=0;
let totalReports=0;

reports.forEach(item=>{

if(!item.department.toLowerCase().includes(search))
return;

totalReports++;
totalPresent+=item.presentCount;
totalAbsent+=item.absentCount;

body.innerHTML+=`

<tr>

<td>${item.date}</td>

<td>${item.time}</td>

<td>${item.department}</td>

<td>${item.teacher}</td>

<td>${item.presentCount}</td>

<td>${item.absentCount}</td>

<td>${item.absentStudents.join(", ")}</td>

</tr>

`;

});

document.getElementById("totalReports").innerHTML=totalReports;
document.getElementById("totalPresent").innerHTML=totalPresent;
document.getElementById("totalAbsent").innerHTML=totalAbsent;

let totalStudents=totalPresent+totalAbsent;

let percent=0;

if(totalStudents>0){

percent=((totalPresent/totalStudents)*100).toFixed(1);

}

document.getElementById("percentage").innerHTML=percent+"%";

}

function exportCSV(){

let reports=JSON.parse(localStorage.getItem("attendanceHistory")) || [];

if(reports.length===0){

alert("No reports available.");

return;

}

let csv="Date,Time,Department,Teacher,Present,Absent,Absent Roll Numbers\n";

reports.forEach(item=>{

csv+=`${item.date},${item.time},${item.department},${item.teacher},${item.presentCount},${item.absentCount},"${item.absentStudents.join(" ")}"\n`;

});

let blob=new Blob([csv],{type:"text/csv"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="Attendance_Report.csv";

link.click();

}

loadReports();

</script>

</body>
</html>
