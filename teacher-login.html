<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Login - KMCE Attendance System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
background-size:400% 400%;
animation:bg 10s infinite alternate;
overflow:hidden;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.login-box{
width:400px;
max-width:90%;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.4);
color:white;
}

.logo{
width:100px;
height:100px;
border-radius:50%;
background:white;
padding:8px;
margin-bottom:15px;
}

h2{
margin-bottom:8px;
}

p{
color:#ddd;
margin-bottom:25px;
font-size:14px;
}

.input-box{
margin-bottom:18px;
text-align:left;
}

.input-box label{
display:block;
margin-bottom:6px;
font-size:14px;
}

.input-box input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:10px;
font-size:15px;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
font-size:14px;
}

.options a{
color:#00d4ff;
text-decoration:none;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:#00bfff;
color:white;
font-size:17px;
cursor:pointer;
transition:.3s;
margin-bottom:15px;
}

.btn:hover{
background:#008cff;
transform:scale(1.03);
}

.back-btn{
background:#555;
}

.back-btn:hover{
background:#333;
}

.footer{
margin-top:10px;
font-size:13px;
color:#ccc;
}

</style>

</head>
<body>

<div class="login-box">

<img src="logo.png" class="logo" alt="College Logo">

<h2>Teacher Login</h2>

<p>Keshava Memorial College of Engineering</p>

<div class="input-box">
<label>Teacher ID</label>
<input type="text" id="teacherId" placeholder="Enter Teacher ID">
</div>

<div class="input-box">
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">
</div>

<div class="options">
<label>
<input type="checkbox" onclick="togglePassword()">
 Show Password
</label>

<a href="#">Forgot Password?</a>
</div>

<label style="display:block;text-align:left;margin-bottom:15px;">
<input type="checkbox">
 Remember Me
</label>

<button class="btn" onclick="login()">Login</button>

<button class="btn back-btn" onclick="window.location='index.html'">Back to Home</button>

<div class="footer">
© 2026 KMCE Attendance Management System
</div>

</div>

<script>

function togglePassword(){

const pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}
else{
pass.type="password";
}

}

function login(){

const id=document.getElementById("teacherId").value.trim();

const pass=document.getElementById("password").value.trim();

if(id==="" || pass===""){

alert("Please enter Teacher ID and Password.");

return;

}

/* Demo Login */

if(id==="teacher" && pass==="1234"){

alert("Login Successful");

window.location="departments.html";

}
else{

alert("Invalid Teacher ID or Password");

}

}

</script>

</body>
</html>
